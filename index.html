<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港社區言語治療中心 - 家長教材網</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50/30 text-slate-800 font-sans">

    <div id="login-overlay" class="fixed inset-0 bg-orange-500 flex flex-col justify-center items-center z-50 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full text-center">
            <h1 class="text-2xl font-bold text-orange-600 mb-2">🍊 香港社區言語治療中心</h1>
            <p class="text-slate-500 text-sm mb-6">請輸入家長專屬密碼以瀏覽教材</p>
            
            <input type="password" id="password-input" placeholder="請輸入密碼" 
                   onkeydown="if(event.key === 'Enter') checkPassword()"
                   class="w-full px-4 py-3 border border-orange-200 rounded-xl mb-4 text-center focus:outline-none focus:ring-2 focus:ring-orange-500">
            
            <button onclick="checkPassword()" 
                    class="w-full bg-orange-500 hover:bg-orange-600 text-white font-medium py-3 rounded-xl transition shadow-md">
                進入網站
            </button>
            <p id="error-msg" class="text-red-500 text-sm mt-3 hidden">❌ 密碼錯誤，請重新輸入</p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="bg-orange-500 text-white p-6 shadow-md text-center">
            <h1 class="text-2xl font-bold">🍊 香港社區言語治療中心</h1>
            <p class="text-sm mt-2 font-light">家長資源網 · 陪小朋友在家輕鬆練習</p>
        </header>

        <main class="max-w-4xl mx-auto p-6">
            
            <section class="mb-6">
                <div class="relative max-w-md">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">🔍</span>
                    <input type="text" id="search-input" oninput="applyFilterAndSearch()"
                           placeholder="輸入關鍵字搜尋教材（如：工作紙、S音）..." 
                           class="w-full pl-10 pr-4 py-3 bg-white border border-orange-200 rounded-xl shadow-sm text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
                </div>
            </section>
            
            <section class="mb-8">
                <h2 class="text-lg font-semibold mb-3 text-orange-700">📌 教材分類</h2>
                <div class="flex flex-wrap gap-3" id="filter-buttons">
                    <button onclick="changeCategory('all', this)" class="bg-orange-500 text-white px-4 py-2 rounded-full font-medium shadow-sm transition">所有教材</button>
                    <button onclick="changeCategory('babble', this)" class="bg-white hover:bg-orange-50 text-slate-600 px-4 py-2 rounded-full font-medium border border-orange-200 transition">牙牙學語</button>
                    <button onclick="changeCategory('sentence', this)" class="bg-white hover:bg-orange-50 text-slate-600 px-4 py-2 rounded-full font-medium border border-orange-200 transition">句子建構</button>
                    <button onclick="changeCategory('story', this)" class="bg-white hover:bg-orange-50 text-slate-600 px-4 py-2 rounded-full font-medium border border-orange-200 transition">故事敘述</button>
                    <button onclick="changeCategory('pronounce', this)" class="bg-white hover:bg-orange-50 text-slate-600 px-4 py-2 rounded-full font-medium border border-orange-200 transition">發音訓練</button>
                    <button onclick="changeCategory('social', this)" class="bg-white hover:bg-orange-50 text-slate-600 px-4 py-2 rounded-full font-medium border border-orange-200 transition">社交訓練</button>
                    <button onclick="changeCategory('game', this)" class="bg-white hover:bg-orange-50 text-slate-600 px-4 py-2 rounded-full font-medium border border-orange-200 transition">有趣遊戲</button>
                    <button onclick="changeCategory('others', this)" class="bg-white hover:bg-orange-50 text-slate-600 px-4 py-2 rounded-full font-medium border border-orange-200 transition">其他教材</button>
                </div>
            </section>

            <section>
                <h2 class="text-lg font-semibold mb-4 text-orange-700">📚 教材列表</h2>
                
                <div id="loading-spinner" class="text-center py-12">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-orange-500 border-t-transparent mb-2"></div>
                    <p class="text-slate-400 text-sm">正在連線到 Airtable 讀取最新教材...</p>
                </div>

                <p id="no-results" class="text-slate-400 text-sm italic py-8 text-center hidden">❌ 找不到符合條件的教材，請試試其他關鍵字。</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="materials-grid">
                    </div>
            </section>

        </main>
    </div>

    <footer class="text-center text-slate-400 text-xs my-12">
        &copy; 2026 香港社區言語治療中心. 版權所有.
    </footer>

    <script>
        const AIRTABLE_BASE_ID = 'appavmqgjBcW6umdd';
        const AIRTABLE_TABLE_NAME = 'Table 1';
        const AIRTABLE_TOKEN = 'pat98TaonLaIXB1L9.8ccdee0d106bc0bda7fa4d987c5ef8b8a1623e0fd3df143fe89069eaa8d2d98b';

        let myMaterials = []; 
        let currentCategory = 'all';

        function checkPassword() {
            const userInput = document.getElementById('password-input').value;
            const correctPassword = "clinic2026"; 

            if (userInput === correctPassword) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                fetchDataFromAirtable(); 
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
                document.getElementById('password-input').value = "";
            }
        }

        function fetchDataFromAirtable() {
            const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}`;
            
            fetch(url, {
                headers: {
                    Authorization: `Bearer ${AIRTABLE_TOKEN}`
                }
            })
            .then(response => response.json())
            .then(data => {
                myMaterials = data.records.map(record => {
                    const fields = record.fields;
                    
                    // 💡 新增：為所有 7 個分類配對最靚嘅專屬顏色標籤
                    let badgeColor = "bg-orange-100 text-orange-800"; // 預設句子建構為橙色
                    if (fields.category === 'babble') badgeColor = "bg-amber-100 text-amber-800";
                    if (fields.category === 'story') badgeColor = "bg-yellow-100 text-yellow-800";
                    if (fields.category === 'pronounce') badgeColor = "bg-red-100 text-red-800";
                    if (fields.category === 'social') badgeColor = "bg-purple-100 text-purple-800"; // 社交為紫色
                    if (fields.category === 'game') badgeColor = "bg-pink-100 text-pink-800";      // 遊戲為粉紅
                    if (fields.category === 'others') badgeColor = "bg-slate-200 text-slate-800";   // 其他為灰色

                    return {
                        title: fields.title || '未命名教材',
                        category: fields.category || 'sentence',
                        categoryName: fields.categoryName || '句子建構',
                        description: fields.description || '暫無簡介。',
                        link: fields.link || '#',
                        badgeColor: badgeColor
                    };
                });

                document.getElementById('loading-spinner').classList.add('hidden');
                renderMaterials();
            })
            .catch(error => {
                console.error('Airtable 連線失敗:', error);
                document.getElementById('loading-spinner').innerHTML = `<p class="text-red-500 text-sm">❌ 連線失敗，請檢查 Airtable 欄位設定或 Token 權限。</p>`;
            });
        }

        function renderMaterials() {
            const grid = document.getElementById('materials-grid');
            grid.innerHTML = myMaterials.map(item => `
                <div class="material-card bg-white rounded-xl shadow-sm p-5 border border-orange-100 flex flex-col justify-between" data-category="${item.category}">
                    <div>
                        <span class="${item.badgeColor} text-xs font-semibold px-2.5 py-1 rounded">${item.categoryName}</span>
                        <h3 class="text-lg font-bold mt-2 text-slate-800">${item.title}</h3>
                        <p class="text-slate-500 text-sm mt-1 text-justify">${item.description}</p>
                    </div>
                    <div class="mt-4 flex justify-between items-center pt-3 border-t border-slate-50">
                        <span class="text-xs text-slate-400">教材文件</span>
                        <a href="${item.link}" target="_blank" class="bg-orange-500 hover:bg-orange-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition shadow-sm">下載教材</a>
                    </div>
                </div>
            `).join('');
            
            applyFilterAndSearch();
        }

        function changeCategory(category, buttonElement) {
            currentCategory = category;
            const buttons = document.querySelectorAll('#filter-buttons button');
            buttons.forEach(btn => {
                btn.className = "bg-white hover:bg-orange-50 text-slate-600 px-4 py-2 rounded-full font-medium border border-orange-200 transition";
            });
            buttonElement.className = "bg-orange-500 text-white px-4 py-2 rounded-full font-medium shadow-sm transition";
            applyFilterAndSearch();
        }

        function applyFilterAndSearch() {
            const searchText = document.getElementById('search-input').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.material-card');
            let visibleCount = 0;

            cards.forEach(card => {
                const cardCategory = card.getAttribute('data-category');
                const titleText = card.querySelector('h3').innerText.toLowerCase();
                const descText = card.querySelector('p').innerText.toLowerCase();

                const matchCategory = (currentCategory === 'all' || cardCategory === currentCategory);
                const matchSearch = (titleText.includes(searchText) || descText.includes(searchText));

                if (matchCategory && matchSearch) {
                    card.classList.remove('hidden');
                    visibleCount++;
                } else {
                    card.classList.add('hidden');
                }
            });

            const noResultsMsg = document.getElementById('no-results');
            if (visibleCount === 0 && myMaterials.length > 0) {
                noResultsMsg.classList.remove('hidden');
            } else {
                noResultsMsg.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
